<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="#1a237e">
  <!-- Simplified Ashoka Chakra / National Emblem representation -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#1a237e" stroke-width="4"/>
  <circle cx="100" cy="100" r="70" fill="none" stroke="#1a237e" stroke-width="2"/>
  <!-- 24 spokes of Ashoka Chakra -->
  <g stroke="#1a237e" stroke-width="2.5">
    <line x1="100" y1="12" x2="100" y2="188"/>
    <line x1="12" y1="100" x2="188" y2="100"/>
    <line x1="37.6" y1="37.6" x2="162.4" y2="162.4"/>
    <line x1="37.6" y1="162.4" x2="162.4" y2="37.6"/>
    <line x1="100" y1="12" x2="100" y2="188" transform="rotate(15 100 100)"/>
    <line x1="100" y1="12" x2="100" y2="188" transform="rotate(30 100 100)"/>
    <line x1="100" y1="12" x2="100" y2="188" transform="rotate(45 100 100)"/>
    <line x1="100" y1="12" x2="100" y2="188" transform="rotate(60 100 100)"/>
    <line x1="100" y1="12" x2="100" y2="188" transform="rotate(75 100 100)"/>
    <line x1="100" y1="12" x2="100" y2="188" transform="rotate(105 100 100)"/>
    <line x1="100" y1="12" x2="100" y2="188" transform="rotate(120 100 100)"/>
    <line x1="100" y1="12" x2="100" y2="188" transform="rotate(135 100 100)"/>
    <line x1="100" y1="12" x2="100" y2="188" transform="rotate(150 100 100)"/>
    <line x1="100" y1="12" x2="100" y2="188" transform="rotate(165 100 100)"/>
  </g>
  <!-- Central hub -->
  <circle cx="100" cy="100" r="15" fill="#1a237e"/>
  <circle cx="100" cy="100" r="8" fill="white"/>
  <!-- सत्यमेव जयते text area - using geometric representation -->
  <text x="100" y="198" text-anchor="middle" font-size="11" font-weight="700" fill="#1a237e" font-family="serif">सत्यमेव जयते</text>
</svg>
