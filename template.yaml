AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Pashu-Aadhaar Enrollment Portal - Serverless Backend

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: nodejs20.x
    Architectures:
      - x86_64
    Tracing: Active
    Environment:
      Variables:
        AWS_NODEJS_CONNECTION_REUSE_ENABLED: '1'
        NODE_OPTIONS: '--enable-source-maps'

Parameters:
  Stage:
    Type: String
    Default: prod
    AllowedValues: [dev, staging, prod]
  S3BucketName:
    Type: String
    Description: S3 bucket name for storing animal images
  SageMakerEndpointName:
    Type: String
    Description: SageMaker endpoint name for embedding generation
  OpenSearchEndpoint:
    Type: String
    Description: OpenSearch endpoint URL for vector similarity search
  OpenSearchIndex:
    Type: String
    Default: livestock-embeddings
    Description: OpenSearch index name for embeddings
  SimilarityThreshold:
    Type: String
    Default: '0.85'
    Description: Cosine similarity threshold for matching
  AllowedOrigin:
    Type: String
    Default: '*'
    Description: CORS allowed origin (set to your frontend domain in production)
  CognitoUserPoolId:
    Type: String
    Description: Cognito User Pool ID for authentication
  CognitoUserPoolArn:
    Type: String
    Description: Cognito User Pool ARN for API Gateway authorizer

Resources:
  # S3 Bucket for animal images
  AnimalImagesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref S3BucketName
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [GET, PUT, POST]
            AllowedOrigins: [!Ref AllowedOrigin]
            MaxAge: 3600
      LifecycleConfiguration:
        Rules:
          - Id: DeleteUploadsAfter30Days
            Status: Enabled
            Prefix: uploads/
            ExpirationInDays: 30

  # Shared utilities Lambda layer
  SharedUtilsLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub 'pashu-aadhaar-shared-utils-${Stage}'
      Description: Shared utilities for Pashu-Aadhaar Lambda functions
      ContentUri: backend/shared/
      CompatibleRuntimes:
        - nodejs20.x
      RetentionPolicy: Delete
    Metadata:
      BuildMethod: nodejs20.x

  # Lambda execution role
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess
      Policies:
        - PolicyName: PashuAadhaarLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: !Sub 'arn:aws:s3:::${S3BucketName}/uploads/*'
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource: !Sub 'arn:aws:s3:::${S3BucketName}/uploads/*'
              - Effect: Allow
                Action:
                  - sagemaker:InvokeEndpoint
                Resource: !Sub 'arn:aws:sagemaker:${AWS::Region}:${AWS::AccountId}:endpoint/${SageMakerEndpointName}'
              - Effect: Allow
                Action:
                  - es:ESHttpGet
                  - es:ESHttpPost
                  - es:ESHttpPut
                Resource: !Sub 'arn:aws:es:${AWS::Region}:${AWS::AccountId}:domain/*'
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/animals'
                  - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/animals/index/*'
                  - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/owners'
                  - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/owners/index/*'
                  - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/health_records'
                  - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/health_records/index/*'
                  - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/milk_yields'
                  - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/milk_yields/index/*'
                  - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/insurance_policies'
                  - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/insurance_policies/index/*'
                  - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/user_role_mapping'
                  - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/user_role_mapping/index/*'
                  - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/embeddings'
                  - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/embeddings/index/*'

  # API Gateway
  PashuAadhaarApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub 'pashu-aadhaar-api-${Stage}'
      StageName: !Ref Stage
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: !Sub "'${AllowedOrigin}'"
      Auth:
        DefaultAuthorizer: CognitoAuth
        Authorizers:
          CognitoAuth:
            UserPoolArn: !Ref CognitoUserPoolArn

  # GetUploadUrl Lambda
  GetUploadUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'pashu-aadhaar-get-upload-url-${Stage}'
      CodeUri: backend/
      Handler: getUploadUrl/handler.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: Generates presigned S3 URL for direct image upload
      Timeout: 10
      Layers:
        - !Ref SharedUtilsLayer
      Environment:
        Variables:
          S3_BUCKET_NAME: !Ref S3BucketName
          ALLOWED_ORIGIN: !Ref AllowedOrigin
      Events:
        GetUploadUrl:
          Type: Api
          Properties:
            RestApiId: !Ref PashuAadhaarApi
            Path: /upload-url
            Method: GET
            Auth:
              Authorizer: NONE
        GetUploadUrlOptions:
          Type: Api
          Properties:
            RestApiId: !Ref PashuAadhaarApi
            Path: /upload-url
            Method: OPTIONS
            Auth:
              Authorizer: NONE
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: 'es2020'
        Sourcemap: true
        EntryPoints:
          - getUploadUrl/handler.ts

  # Enroll Lambda
  EnrollFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'pashu-aadhaar-enroll-${Stage}'
      CodeUri: backend/
      Handler: dist/enroll/handler.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: Processes animal enrollment using SageMaker and OpenSearch
      Timeout: 60
      MemorySize: 1024
      Layers:
        - !Ref SharedUtilsLayer
      Environment:
        Variables:
          S3_BUCKET_NAME: !Ref S3BucketName
          SAGEMAKER_ENDPOINT_NAME: !Ref SageMakerEndpointName
          OPENSEARCH_ENDPOINT: !Ref OpenSearchEndpoint
          OPENSEARCH_INDEX: !Ref OpenSearchIndex
          SIMILARITY_THRESHOLD: !Ref SimilarityThreshold
          ALLOWED_ORIGIN: !Ref AllowedOrigin
      Events:
        Enroll:
          Type: Api
          Properties:
            RestApiId: !Ref PashuAadhaarApi
            Path: /enroll
            Method: POST
            Auth:
              Authorizer: NONE
        EnrollOptions:
          Type: Api
          Properties:
            RestApiId: !Ref PashuAadhaarApi
            Path: /enroll
            Method: OPTIONS
            Auth:
              Authorizer: NONE
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: 'es2020'
        Sourcemap: true
        EntryPoints:
          - enroll/handler.ts

  # Animals CRUD Lambda
  AnimalsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'pashu-aadhaar-animals-${Stage}'
      CodeUri: backend/
      Handler: animals/handler.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: Animals CRUD - list, get, update, health records, milk yields
      Timeout: 30
      MemorySize: 512
      Environment:
        Variables:
          ALLOWED_ORIGIN: !Ref AllowedOrigin
      Events:
        ListAnimals:
          Type: Api
          Properties:
            RestApiId: !Ref PashuAadhaarApi
            Path: /animals
            Method: GET
            Auth:
              Authorizer: CognitoAuth
        ListAnimalsOptions:
          Type: Api
          Properties:
            RestApiId: !Ref PashuAadhaarApi
            Path: /animals
            Method: OPTIONS
            Auth:
              Authorizer: NONE
        GetAnimal:
          Type: Api
          Properties:
            RestApiId: !Ref PashuAadhaarApi
            Path: /animals/{id}
            Method: GET
            Auth:
              Authorizer: CognitoAuth
        UpdateAnimal:
          Type: Api
          Properties:
            RestApiId: !Ref PashuAadhaarApi
            Path: /animals/{id}
            Method: POST
            Auth:
              Authorizer: CognitoAuth
        GetAnimalOptions:
          Type: Api
          Properties:
            RestApiId: !Ref PashuAadhaarApi
            Path: /animals/{id}
            Method: OPTIONS
            Auth:
              Authorizer: NONE
        GetHealthRecords:
          Type: Api
          Properties:
            RestApiId: !Ref PashuAadhaarApi
            Path: /animals/{id}/health
            Method: GET
            Auth:
              Authorizer: CognitoAuth
        AddHealthRecord:
          Type: Api
          Properties:
            RestApiId: !Ref PashuAadhaarApi
            Path: /animals/{id}/health
            Method: POST
            Auth:
              Authorizer: CognitoAuth
        HealthOptions:
          Type: Api
          Properties:
            RestApiId: !Ref PashuAadhaarApi
            Path: /animals/{id}/health
            Method: OPTIONS
            Auth:
              Authorizer: NONE
        GetMilkYields:
          Type: Api
          Properties:
            RestApiId: !Ref PashuAadhaarApi
            Path: /animals/{id}/milk
            Method: GET
            Auth:
              Authorizer: CognitoAuth
        AddMilkYield:
          Type: Api
          Properties:
            RestApiId: !Ref PashuAadhaarApi
            Path: /animals/{id}/milk
            Method: POST
            Auth:
              Authorizer: CognitoAuth
        MilkOptions:
          Type: Api
          Properties:
            RestApiId: !Ref PashuAadhaarApi
            Path: /animals/{id}/milk
            Method: OPTIONS
            Auth:
              Authorizer: NONE
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: 'es2020'
        Sourcemap: true
        EntryPoints:
          - animals/handler.ts

  # Profile Lambda
  ProfileFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'pashu-aadhaar-profile-${Stage}'
      CodeUri: backend/
      Handler: profile/handler.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: User profile - returns Cognito claims and DynamoDB owner data
      Timeout: 10
      MemorySize: 256
      Environment:
        Variables:
          ALLOWED_ORIGIN: !Ref AllowedOrigin
      Events:
        GetProfile:
          Type: Api
          Properties:
            RestApiId: !Ref PashuAadhaarApi
            Path: /me
            Method: GET
            Auth:
              Authorizer: CognitoAuth
        ProfileOptions:
          Type: Api
          Properties:
            RestApiId: !Ref PashuAadhaarApi
            Path: /me
            Method: OPTIONS
            Auth:
              Authorizer: NONE
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: 'es2020'
        Sourcemap: true
        EntryPoints:
          - profile/handler.ts

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${PashuAadhaarApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}'
    Export:
      Name: !Sub '${AWS::StackName}-ApiUrl'

  AnimalImagesBucketName:
    Description: S3 bucket name for animal images
    Value: !Ref AnimalImagesBucket
    Export:
      Name: !Sub '${AWS::StackName}-BucketName'

  GetUploadUrlFunctionArn:
    Description: GetUploadUrl Lambda function ARN
    Value: !GetAtt GetUploadUrlFunction.Arn

  EnrollFunctionArn:
    Description: Enroll Lambda function ARN
    Value: !GetAtt EnrollFunction.Arn

  AnimalsFunctionArn:
    Description: Animals Lambda function ARN
    Value: !GetAtt AnimalsFunction.Arn

  ProfileFunctionArn:
    Description: Profile Lambda function ARN
    Value: !GetAtt ProfileFunction.Arn
